<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance Scanner - FOOTBALLHUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3f0071;
            --accent-color: #3b82f6;
            --bg-color: #f1f5f9;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background-color: var(--primary-color);
            color: white;
            position: fixed;
            width: 240px;
            z-index: 1000;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
            overflow-y: scroll;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h3 {
            font-weight: 700;
            font-size: 1.4rem;
            margin: 0;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 25px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .sidebar a.active {
            border-left-color: var(--accent-color);
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15) 0%, transparent 100%);
        }

        .sidebar a i {
            width: 20px;
            margin-right: 10px;
            text-align: center;
        }

        .content {
            margin-left: 240px;
            padding: 30px;
        }

        /* Scanner card */
        .scanner-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            max-width: 520px;
            margin: 0 auto;
        }

        #reader {
            border-radius: 14px;
            overflow: hidden;
            border: 3px solid var(--accent-color);
        }

        #reader video {
            border-radius: 12px;
        }

        /* Result box */
        .result-box {
            border-radius: 14px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .result-success {
            background: #d1fae5;
            border: 2px solid #10b981;
        }

        .result-error {
            background: #fee2e2;
            border: 2px solid #ef4444;
        }

        .result-box .icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .result-box .book-info {
            font-size: 0.95rem;
            margin-top: 10px;
        }

        .result-box .book-info strong {
            display: inline-block;
            min-width: 70px;
        }

        /* Animate in */
        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .result-box.show {
            display: block;
            animation: popIn 0.3s ease;
        }

        .btn-scan {
            background: linear-gradient(135deg, #3f0071, #6b21a8);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 28px;
            font-weight: 700;
        }

        .btn-scan:hover {
            background: linear-gradient(135deg, #6b21a8, #3f0071);
            color: white;
        }

        .btn-scan:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
    <link rel="stylesheet" href="/css/mobile-responsive.css">
</head>

<body>
    <!-- Mobile Menu Button -->
    <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Open menu">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3><img src="/favicon.png"
                    style="height:26px;width:26px;object-fit:contain;border-radius:4px;margin-right:8px;">FOOTBALLHUB
            </h3>
        </div>
        <div class="mt-3">
            <a href="/staff/dashboard"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/staff/bookings"><i class="fas fa-book"></i> Bookings</a>
            <a href="/staff/payment-field"><i class="fas fa-credit-card"></i> Payments</a>
            <a href="/staff/reports"><i class="fas fa-exclamation-circle"></i> Reports</a>
            <a href="/staff/maintenance"><i class="fas fa-tools"></i> Maintenance</a>
            <a href="/staff/scan-qr" class="active"><i class="fas fa-qrcode"></i> Scan QR</a>
            <a href="/staff/attendance"><i class="fas fa-calendar-check"></i> Attendance</a>
        </div>
        <div style="position:absolute;bottom:20px;width:100%;">
            <a href="/logout" class="text-danger"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content">
        <div class="text-center mb-4">
            <h2 class="fw-bold mb-1" style="color:#3f0071;">
                <i class="fas fa-qrcode me-2"></i>QR Attendance Scanner
            </h2>
            <p class="text-muted">Scan the customer's booking QR code to verify their attendance</p>
        </div>

        <div class="scanner-card">
            <!-- Camera Scanner -->
            <div id="reader"></div>

            <div class="text-center mt-3">
                <button class="btn btn-scan" id="startBtn" onclick="startScanner()">
                    <i class="fas fa-camera me-2"></i>Open Camera
                </button>
                <button class="btn btn-outline-secondary ms-2" id="stopBtn" onclick="stopScanner()"
                    style="display:none; border-radius:10px;">
                    <i class="fas fa-stop me-1"></i>Stop
                </button>
            </div>

            <!-- Result Box -->
            <div class="result-box" id="resultBox">
                <div class="text-center">
                    <div class="icon" id="resultIcon"></div>
                    <h5 class="fw-bold mb-0" id="resultTitle"></h5>
                    <div class="book-info" id="resultDetails"></div>
                </div>
                <div class="text-center mt-3">
                    <button class="btn btn-scan" onclick="resetScanner()">
                        <i class="fas fa-qrcode me-1"></i>Scan Next
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- html5-qrcode library for camera scanning -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        let html5QrCode = null;
        let scanning = false;

        function startScanner() {
            if (scanning) return;
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrCode.start(
                { facingMode: "environment" },
                config,
                (decodedText) => {
                    // QR successfully scanned
                    stopScanner();
                    verifyToken(decodedText);
                },
                (errorMessage) => { /* ignore scan errors */ }
            ).then(() => {
                scanning = true;
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'inline-block';
            }).catch(err => {
                alert('Cannot access camera: ' + err);
            });
        }

        function stopScanner() {
            if (html5QrCode && scanning) {
                html5QrCode.stop().catch(() => { });
                scanning = false;
            }
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
        }

        function verifyToken(token) {
            if (!token || !token.trim()) return;
            stopScanner();

            fetch('/staff/verify-qr', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token.trim() })
            })
                .then(r => r.json())
                .then(data => showResult(data))
                .catch(() => showResult({ success: false, message: 'Network error. Please try again.' }));
        }

        function showResult(data) {
            const box = document.getElementById('resultBox');
            const icon = document.getElementById('resultIcon');
            const title = document.getElementById('resultTitle');
            const details = document.getElementById('resultDetails');

            box.className = 'result-box show';

            if (data.success) {
                box.classList.add('result-success');
                icon.textContent = '✅';
                title.textContent = 'Check-in Successful!';
                title.style.color = '#065f46';
            } else {
                box.classList.add('result-error');
                icon.textContent = '❌';
                title.textContent = data.message || 'QR Code was invalid';
                title.style.color = '#991b1b';
            }

            if (data.bookingId) {
                details.innerHTML = `
                    <div class="mt-2 p-3 rounded" style="background:rgba(255,255,255,0.7);">
                        <div><strong>Booking #</strong>${data.bookingId}</div>
                        <div><strong>Customer</strong>${data.customer || ''}</div>
                        <div><strong>Field</strong>${data.field || ''} ${data.branch ? '— ' + data.branch : ''}</div>
                        <div><strong>Date</strong>${data.date || ''}</div>
                        <div><strong>Time</strong>${data.time || ''}</div>
                        <div><strong>Status</strong>${data.status || ''}</div>
                    </div>`;
            } else {
                details.innerHTML = '';
            }
        }

        function resetScanner() {
            const box = document.getElementById('resultBox');
            box.className = 'result-box';
            document.getElementById('resultDetails').innerHTML = '';
            // Restart camera
            startScanner();
        }
    </script>
    <script>
        // Mobile sidebar toggle
        function toggleSidebar() {
            var sidebar = document.querySelector('.sidebar');
            var overlay = document.getElementById('sidebarOverlay');
            if (sidebar) sidebar.classList.toggle('show');
            if (overlay) overlay.classList.toggle('show');
        }
        // Close sidebar on ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                var sidebar = document.querySelector('.sidebar');
                var overlay = document.getElementById('sidebarOverlay');
                if (sidebar) sidebar.classList.remove('show');
                if (overlay) overlay.classList.remove('show');
            }
        });
    </script>
</body>

</html>
