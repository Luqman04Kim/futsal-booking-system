<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Your Experience – FOOTBALLHUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Chakra+Petch:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
        }

        .review-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        .review-card h2 {
            font-family: 'Chakra Petch', sans-serif;
            color: #0f172a;
            font-size: 1.6rem;
        }

        .booking-info {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            color: #475569;
        }

        /* Star Rating (CSS-only interactive) */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 6px;
            margin: 20px 0;
        }

        .star-rating input[type="radio"] {
            display: none;
        }

        .star-rating label {
            font-size: 2.8rem;
            color: #cbd5e1;
            cursor: pointer;
            transition: color 0.2s, transform 0.15s;
        }

        .star-rating label:hover,
        .star-rating label:hover~label,
        .star-rating input:checked~label {
            color: #f59e0b;
        }

        .star-rating label:hover {
            transform: scale(1.15);
        }

        .star-rating input:checked+label {
            transform: scale(1.1);
        }

        .rating-hint {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            margin-top: -10px;
            margin-bottom: 20px;
            height: 18px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #d97706, #b45309);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        .btn-back {
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
        }

        textarea.form-control {
            border-radius: 10px;
            resize: none;
            font-size: 0.9rem;
        }
    </style>
    <link rel="stylesheet" href="/css/mobile-responsive.css">
</head>

<body>
    <div class="review-card">
        <!-- Header -->
        <div class="text-center mb-4">
            <img src="/favicon.png"
                style="height:52px;width:52px;object-fit:contain;border-radius:8px;margin-bottom:10px;">
            <h2><i class="fas fa-star me-2" style="color:#f59e0b;"></i>Rate Your Experience</h2>
            <p class="text-muted" style="font-size:0.9rem;">Your feedback helps us improve!</p>
        </div>

        <!-- Booking Summary -->
        <div class="booking-info">
            <div class="d-flex justify-content-between">
                <span><i class="fas fa-map-marker-alt me-1 text-primary"></i>
                    <strong th:text="${booking.field != null ? booking.field.name : 'Field'}">Field A</strong>
                </span>
                <span th:text="${booking.date}">2025-01-01</span>
            </div>
            <div class="mt-1 text-muted">
                <i class="fas fa-clock me-1"></i>
                <span th:text="${booking.startTime}">10:00</span> –
                <span th:text="${booking.endTime}">12:00</span>
                &nbsp;|&nbsp; Booking
                <strong th:text="'#' + ${booking.bookingId}"></strong>
            </div>
        </div>

        <!-- Review Form -->
        <form th:action="@{/review/{id}(id=${booking.bookingId})}" method="post" id="reviewForm">

            <!-- Star Rating -->
            <div class="mb-2">
                <label class="form-label fw-semibold d-block text-center" style="color:#1e293b;">How was your
                    experience?</label>
                <div class="star-rating" id="starRating">
                    <input type="radio" id="star5" name="rating" value="5" required>
                    <label for="star5" title="Excellent" class="fas fa-star"></label>
                    <input type="radio" id="star4" name="rating" value="4">
                    <label for="star4" title="Good" class="fas fa-star"></label>
                    <input type="radio" id="star3" name="rating" value="3">
                    <label for="star3" title="Average" class="fas fa-star"></label>
                    <input type="radio" id="star2" name="rating" value="2">
                    <label for="star2" title="Poor" class="fas fa-star"></label>
                    <input type="radio" id="star1" name="rating" value="1">
                    <label for="star1" title="Terrible" class="fas fa-star"></label>
                </div>
                <div class="rating-hint" id="ratingHint">Click a star to rate</div>
            </div>

            <!-- Comment -->
            <div class="mb-4">
                <label class="form-label fw-semibold" style="color:#1e293b;">
                    <i class="fas fa-comment me-1 text-primary"></i>Leave a Comment <span
                        class="text-muted fw-normal">(optional)</span>
                </label>
                <textarea name="comment" class="form-control" rows="3" maxlength="500"
                    placeholder="Tell us what you liked or what we can improve…"></textarea>
            </div>

            <!-- Buttons -->
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-submit">
                    <i class="fas fa-paper-plane me-2"></i>Submit Review
                </button>
                <a href="/my-bookings" class="btn btn-outline-secondary btn-back text-center">
                    <i class="fas fa-arrow-left me-2"></i>Back to My Bookings
                </a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const hints = { 1: 'Terrible 😞', 2: 'Poor 😕', 3: 'Average 😐', 4: 'Good 😊', 5: 'Excellent! 🌟' };
        document.querySelectorAll('input[name="rating"]').forEach(r => {
            r.addEventListener('change', () => {
                document.getElementById('ratingHint').textContent = hints[r.value];
            });
        });
        document.getElementById('reviewForm').addEventListener('submit', function (e) {
            const rated = document.querySelector('input[name="rating"]:checked');
            if (!rated) { e.preventDefault(); alert('Please select a star rating.'); }
        });
    </script>
</body>

</html>
