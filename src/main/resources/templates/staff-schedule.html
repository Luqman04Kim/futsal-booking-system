<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Schedule - FOOTBALLHUB</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3f0071;
            /* Staff Purple */
            --secondary-color: #334155;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background-color: var(--primary-color);
            color: white;
            position: fixed;
            width: 240px;
            z-index: 1000;
            transition: all 0.3s ease;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
            overflow-y: scroll;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h3 {
            font-weight: 700;
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 25px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .sidebar a.active {
            border-left-color: var(--accent-color);
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
        }

        .sidebar a i {
            width: 20px;
            margin-right: 10px;
            text-align: center;
        }

        /* Content */
        .content {
            margin-left: 240px;
            padding: 25px;
        }

        /* Match Card Styling */
        .match-card {
            border: none;
            border-left: 5px solid #1cc88a;
            /* Green for Approved */
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
            margin-bottom: 20px;
        }

        .match-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .time-box {
            background-color: #f8f9fa;
            text-align: center;
            padding: 15px;
            border-right: 1px solid #eee;
            min-width: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .time-start {
            font-size: 1.2rem;
            font-weight: 800;
            color: #2c3e50;
            display: block;
        }

        .time-date {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }

        .match-details {
            padding: 20px;
            flex-grow: 1;
        }

        .match-team {
            font-size: 1.1rem;
            font-weight: bold;
            color: #3f0071;
        }

        .location-badge {
            background-color: #eef2ff;
            color: #3f0071;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            margin-top: 5px;
        }
    </style>
    <link rel="stylesheet" href="/css/mobile-responsive.css">
</head>

<body>
    <!-- Mobile Menu Button -->
    <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Open menu">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>


    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3><img src="/favicon.png" style="height:28px;width:28px;object-fit:contain;margin-right:8px;border-radius:4px;">FOOTBALLHUB</h3>
        </div>
        <div class="mt-3">
            <a href="/staff/dashboard"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/staff/bookings"><i class="fas fa-book"></i> Bookings</a>
            <a href="/staff/deposit-settings"><i class="fas fa-credit-card"></i> Deposit</a>
            <a href="/staff/reports"><i class="fas fa-exclamation-circle"></i> Reports</a>
            <a href="/staff/maintenance"><i class="fas fa-tools"></i> Maintenance</a>
            <a href="/staff/scan-qr"><i class="fas fa-qrcode"></i> Scan QR</a>
            <a href="/staff/attendance"><i class="fas fa-calendar-check"></i> Attendance</a>
        </div>
        <div style="margin-top: auto; padding-bottom: 20px;">
            <a href="/logout" class="text-danger"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-primary">Match Schedule</h2>
        </div>

        <div class="row">
            <div class="col-lg-10 mx-auto">
                <!-- Loop through bookings -->
                <div class="match-card d-flex" th:each="booking : ${bookings}">
                    <!-- Left: Time -->
                    <div class="time-box">
                        <span class="time-start" th:text="${booking.startTime}">10:00</span>
                        <span class="time-date" th:text="${booking.date}">Nov 28</span>
                    </div>
                    <!-- Center: Details -->
                    <div class="match-details">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="match-team">
                                    <i class="fas fa-users me-2 text-muted"></i>
                                    <span th:text="${booking.user.username}">Team Tigers</span>
                                </div>
                                <div class="location-badge">
                                    <i class="fas fa-map-marker-alt me-1 text-danger"></i>
                                    <!-- Show Branch Name safely -->
                                    <span th:text="${booking.field.branch != null ? booking.field.branch.name : 'Main Branch'}">Branch</span>
                                    <span class="mx-1 text-muted">�</span>
                                    <span th:text="${booking.field.name}">Field A</span>
                                </div>
                            </div>
                            <div class="text-end">
                                <span class="badge bg-success text-uppercase px-3 py-2">Confirmed</span>
                                <div class="small text-muted mt-2" th:text="'REF: #' + ${booking.bookingId}">#101</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div class="text-center py-5 text-muted" th:if="${#lists.isEmpty(bookings)}">
                    <i class="fas fa-calendar-times fa-3x mb-3" style="opacity: 0.3;"></i>
                    <h4>No matches scheduled.</h4>
                    <p>Wait for booking approvals to populate this list.</p>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script>
        // Mobile sidebar toggle
        function toggleSidebar() {
            var sidebar = document.querySelector('.sidebar');
            var overlay = document.getElementById('sidebarOverlay');
            if (sidebar) sidebar.classList.toggle('show');
            if (overlay) overlay.classList.toggle('show');
        }
        // Close sidebar on ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                var sidebar = document.querySelector('.sidebar');
                var overlay = document.getElementById('sidebarOverlay');
                if (sidebar) sidebar.classList.remove('show');
                if (overlay) overlay.classList.remove('show');
            }
        });
    </script>
</body>

</html>
