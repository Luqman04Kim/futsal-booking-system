<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FOOTBALLHUB Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700;800&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/mobile-responsive.css">


    <style>
        :root {
            --barca-blue: #004d98;
            --barca-pink: #a50044;
            /* Garnet/Pink */
            --barca-gold: #fdc52c;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* BOLD GRADIENT: Pink (Garnet) to Blue */
            background: linear-gradient(135deg, var(--barca-pink) 0%, var(--barca-blue) 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
            position: relative;
        }

        /* Optional: Subtle pattern overlay to add texture like the photo */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(45deg,
                    rgba(0, 0, 0, 0.05) 0px,
                    rgba(0, 0, 0, 0.05) 2px,
                    transparent 2px,
                    transparent 10px);
            z-index: -1;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
            /* Optional: Add a very subtle dark backdrop to make text pop against the gradient */
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(5px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .brand-header {
            margin-bottom: 40px;
        }

        .brand-title {
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .brand-subtitle {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 3px solid var(--barca-gold);
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .login-label {
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .form-control {
            background-color: #f0f2f5;
            border: none;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            font-weight: 500;
            color: #333;
        }

        .form-control:focus {
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(253, 197, 44, 0.6);
        }

        .btn-access {
            background-color: var(--barca-gold);
            color: #000;
            border: none;
            padding: 15px;
            font-weight: 800;
            width: 100%;
            border-radius: 4px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Chakra Petch', sans-serif;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn-access:hover {
            background-color: #e0a800;
            transform: translateY(-2px);
        }

        .links-area {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .links-area a {
            color: var(--barca-gold);
            text-decoration: none;
            font-weight: 600;
        }

        .links-area a:hover {
            text-decoration: underline;
        }

        .footer-section {
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: left;
        }

        .footer-title {
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <div class="brand-header">
            <div class="brand-title"><img src="/favicon.png"
                    style="height:32px;width:32px;object-fit:contain;margin-right:8px;border-radius:4px;vertical-align:middle;">
                FOOTBALL HUB</div>
            <div class="brand-subtitle">Welcome to FOOTBALLHUB Portal</div>
        </div>

        <div th:if="${error}" class="alert alert-danger py-2 small fw-bold text-center shadow-sm">
            <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${error}"></span>
        </div>
        <div th:if="${param.success}" class="alert alert-success py-2 small fw-bold text-center shadow-sm">
            <i class="fas fa-check-circle me-1"></i> Registration successful!
        </div>

        <div class="login-label">LOGIN</div>

        <form action="/login" method="POST">
            <div class="input-group mb-3">
                <span class="input-group-text border-0 rounded-start-1" style="background: #e9ecef;"><i
                        class="fas fa-user text-secondary"></i></span>
                <input type="email" class="form-control m-0" name="email" placeholder="User Email" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text border-0 rounded-start-1" style="background: #e9ecef;"><i
                        class="fas fa-lock text-secondary"></i></span>
                <input type="password" class="form-control m-0" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-access">ACCESS</button>

            <div class="links-area">
                <a href="/forgot-password">Forgot Password?</a>
                <a href="/register">Don't have an account? Register here</a>
            </div>
        </form>

        <div class="footer-section">
            <div class="footer-title">USER SUPPORT</div>
            <div>Email: support@footballhub.com</div>

            <div class="mt-2 text-decoration-underline">Technical Requirements</div>
        </div>

    </div>

</body>

</html>
